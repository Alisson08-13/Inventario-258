<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Equipos - CBTis 258</title>
<a href="regfallas.html">
<button>Registrar fallas</button>
</a>
<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
}

header{
background:#0b3d91;
color:white;
padding:20px;
text-align:center;
}

h1{
margin:0;
}

.container{
width:85%;
margin:auto;
margin-top:30px;
}

.formulario{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0px 0px 8px rgba(0,0,0,0.2);
margin-bottom:30px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

label{
font-weight:bold;
}

input, select, textarea{
padding:8px;
border:1px solid #ccc;
border-radius:4px;
width:100%;
}

button{
background:#0b3d91;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#072c66;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0px 0px 8px rgba(0,0,0,0.2);
}

th{
background:#0b3d91;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.bueno{
color:green;
font-weight:bold;
}

.danado{
color:red;
font-weight:bold;
}

footer{
text-align:center;
margin-top:30px;
padding:10px;
color:gray;
}

</style>

<script>

function registrarEquipo(){

let lab=document.getElementById("lab").value;
let pc=document.getElementById("pc").value;
let marca=document.getElementById("marca").value;
let modelo=document.getElementById("modelo").value;
let estado=document.getElementById("estado").value;
let obs=document.getElementById("obs").value;

let tabla=document.getElementById("tablaEquipos");

let fila=tabla.insertRow(-1);

fila.insertCell(0).innerHTML=lab;
fila.insertCell(1).innerHTML=pc;
fila.insertCell(2).innerHTML=marca;
fila.insertCell(3).innerHTML=modelo;

if(estado=="Buen estado"){
fila.insertCell(4).innerHTML="<span class='bueno'>Buen estado</span>";
}else{
fila.insertCell(4).innerHTML="<span class='danado'>Equipo dañado</span>";
}

fila.insertCell(5).innerHTML=obs;

}

</script>

</head>

<body>

<header>
<h1>Centro de Bachillerato Tecnológico Industrial y de Servicios 258</h1>
<p>Sistema de Control de Equipos de Laboratorio</p>
</header>

<div class="container">

<div class="formulario">

<h2>Registro de Estado de Equipos</h2>

<div class="form-grid">

<div>
<label>Laboratorio</label>
<select id="lab">
<option>Laboratorio 1</option>
<option>Laboratorio 2</option>
<option>Laboratorio 3</option>
</select>
</div>

<div>
<label>Número de PC</label>
<input type="number" id="pc">
</div>

<div>
<label>Marca</label>
<input type="text" id="marca">
</div>

<div>
<label>Modelo</label>
<input type="text" id="modelo">
</div>

<div>
<label>Estado del equipo</label>
<select id="estado">
<option>Buen estado</option>
<option>Equipo dañado</option>
</select>
</div>

<div>
<label>Observaciones</label>
<textarea id="obs"></textarea>
</div>

</div>

<button onclick="registrarEquipo()">Registrar Equipo</button>

</div>

<h2>Lista de Equipos Registrados</h2>

<table id="tablaEquipos">

<tr>
<th>Laboratorio</th>
<th>No. PC</th>
<th>Marca</th>
<th>Modelo</th>
<th>Estado</th>
<th>Observaciones</th>
</tr>

</table>

</div>

<footer>
Sistema de Inventario de Laboratorios | CBTis 258
</footer>

</body>
</html>
